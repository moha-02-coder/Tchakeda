<div class="page-header">
  <h4>Créer un bâtiment</h4>
</div>

<div class="content-container">
  <form (ngSubmit)="create()" class="form-card building-grid">

    <!-- Nom du bâtiment -->
    <div class="form-group">
      <label>Nom du bâtiment</label>
      <input type="text" [(ngModel)]="form.name" name="name" class="underline-input" required />
      <div class="error" *ngIf="errors.name">{{ errors.name }}</div>
    </div>

    <!-- Type de bâtiment -->
    <div class="form-group">
      <label>Type de bâtiment</label>
      <div class="input-with-button">
        <select [(ngModel)]="form.type" name="type" class="underline-input" required (change)="onTypeChange($event)">
          <option [ngValue]="null">Sélectionner...</option>
          <option value="résidentiel">Résidentiel</option>
          <option value="commercial">Commercial</option>
          <option value="mixte">Mixte</option>
          <option value="autre">Autre...</option>
        </select>
        <input *ngIf="isCustomType" type="text" [(ngModel)]="form.customType" name="customType" class="underline-input" placeholder="Saisir le type" />
      </div>
      <div class="error" *ngIf="errors.type">{{ errors.type }}</div>
      <div class="error" *ngIf="errors.customType">{{ errors.customType }}</div>
    </div>

    <!-- Nombre d'étages -->
    <div class="form-group">
      <label>Nombre d'étages</label>
      <input type="number" [(ngModel)]="form.floors" name="floors" class="underline-input" required min="1" />
      <div class="error" *ngIf="errors.floors">{{ errors.floors }}</div>
    </div>

    <!-- Nombre d'appartements -->
    <div class="form-group">
      <label>Nombre d'appartements</label>
      <input type="number" [(ngModel)]="form.apartments" name="apartments" class="underline-input" required min="1" />
      <div class="error" *ngIf="errors.apartments">{{ errors.apartments }}</div>
    </div>

    <!-- Adresse -->
    <div class="form-group">
      <label>Adresse</label>
      <input type="text" [(ngModel)]="form.address" name="address" class="underline-input" required />
      <div class="error" *ngIf="errors.address">{{ errors.address }}</div>
    </div>

    <!-- Ville -->
    <div class="form-group">
      <label>Ville</label>
      <input type="text" [(ngModel)]="form.city" name="city" class="underline-input" required />
      <div class="error" *ngIf="errors.city">{{ errors.city }}</div>
    </div>

    <!-- Quartier / Région -->
    <div class="form-group">
      <label>Quartier / Région</label>
      <input type="text" [(ngModel)]="form.region" name="region" class="underline-input" required />
      <div class="error" *ngIf="errors.region">{{ errors.region }}</div>
    </div>

    <!-- Date de construction -->
    <div class="form-group">
      <label>Date de construction</label>
      <input type="date" [(ngModel)]="form.constructionDate" name="constructionDate" class="underline-input" required />
      <div class="error" *ngIf="errors.constructionDate">{{ errors.constructionDate }}</div>
    </div>

    <!-- Propriétaire avec possibilité de créer -->
    <div class="form-group full-width">
      <label>Propriétaire</label>
      <div class="input-with-button">
        <select [(ngModel)]="form.ownerId" name="ownerId" class="underline-input" required>
          <option [ngValue]="null">Sélectionner...</option>
          <option *ngFor="let owner of owners" [ngValue]="owner.id">{{ owner.fullName }}</option>
        </select>
        <button type="button" class="btn btn-light" (click)="goToNewOwner()">Nouveau propriétaire</button>
      </div>
      <div class="error" *ngIf="errors.ownerId">{{ errors.ownerId }}</div>
    </div>

    <!-- Actions -->
    <div class="form-actions">
      <button type="button" class="btn btn-light" (click)="cancel()">Annuler</button>
      <button type="submit" class="btn btn-primary">Créer</button>
    </div>

  </form>
</div>
