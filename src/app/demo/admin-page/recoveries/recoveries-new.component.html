<div class="page-header">
  <h4>Créer un recouvrement</h4>
</div>
<div class="content-container">
  <form (ngSubmit)="create()" class="form-card">
    <div class="form-group">
      <label>Location</label>
      <input type="number" [(ngModel)]="form.rentalId" name="rentalId" class="underline-input" required />
      <div class="error" *ngIf="errors.rentalId">{{ errors.rentalId }}</div>
    </div>
    <div class="form-group">
      <label>Montant</label>
      <input type="number" [(ngModel)]="form.amount" name="amount" class="underline-input" required min="1" />
      <div class="error" *ngIf="errors.amount">{{ errors.amount }}</div>
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" [(ngModel)]="form.date" name="date" class="underline-input" required />
      <div class="error" *ngIf="errors.date">{{ errors.date }}</div>
    </div>
    <div class="form-group">
      <label>Statut</label>
      <input type="text" [(ngModel)]="form.status" name="status" class="underline-input" required />
      <div class="error" *ngIf="errors.status">{{ errors.status }}</div>
    </div>
    <div class="form-group">
      <label>Recouvreur</label>
      <input type="text" [(ngModel)]="form.status" name="name" class="underline-input" required />
      <div class="error" *ngIf="errors.name">{{ errors.name }}</div>
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-light" (click)="cancel()">Annuler</button>
      <button type="submit" class="btn btn-primary">Créer</button>
    </div>
  </form>
</div>
